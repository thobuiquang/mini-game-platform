<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giao diện Game T36</title>
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">T36</div>

      <div class="search-box">
        <input
          type="text"
          class="search-input"
          placeholder="Tìm game (Enter hoặc 🔍)"
          autocomplete="off"
        />
        <button type="button" class="search-button" aria-label="Tìm kiếm">
          🔍
        </button>
      </div>

      <div class="auth-buttons">
        <button type="button" class="btn btn-login">Đăng Nhập</button>
        <button type="button" class="btn btn-register">Đăng Ký</button>
      </div>
    </header>

    <main class="main-content">
      <div class="top-bar">
        <button type="button" class="category-button">Thể loại</button>
        <h1 class="page-title">Trang chủ</h1>
      </div>

      <p id="api-status" class="api-status" role="status"></p>

      <div class="game-container">
        <div id="game-grid" class="game-grid"></div>
      </div>
    </main>

    <script src="/ui/app.js" defer></script>
  </body>
</html>
