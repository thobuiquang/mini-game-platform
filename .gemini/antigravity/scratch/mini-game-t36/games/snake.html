<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rắn Săn Mồi - Neon Snake | T36</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg-color: #0d0d1c;
            --surface-color: #1a1a2a;
            --primary-neon: #bc13fe;
            --secondary-neon: #00f1fd;
            --text-color: #ffffff;
            --danger: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: 0.3s;
            opacity: 0.8;
        }

        .back-link:hover {
            opacity: 1;
            color: var(--secondary-neon);
        }

        .logo {
            font-weight: 700;
            font-size: 24px;
            color: var(--primary-neon);
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.5);
        }

        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .stat-item span {
            display: block;
            font-size: 12px;
            color: var(--secondary-neon);
            opacity: 0.7;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 32px;
            color: var(--secondary-neon);
            text-shadow: 0 0 10px rgba(0, 241, 253, 0.5);
        }

        .game-container {
            position: relative;
            background: var(--surface-color);
            border: 2px solid var(--primary-neon);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
            border-radius: 8px;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 28, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        .overlay h2 {
            margin-bottom: 15px;
        }

        .btn {
            background: var(--primary-neon);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transform: skewX(-10deg);
            transition: 0.2s;
        }

        .btn:hover {
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.8);
            transform: skewX(-10deg) scale(1.05);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid white;
            margin-left: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <header class="game-header">
        <a href="../index.html" class="back-link">← Quay lại trang chủ</a>
        <div class="logo">NEON SNAKE</div>
        <div style="width: 150px;"></div>
    </header>

    <div class="stats">
        <div class="stat-item">
            <span>SCORE</span>
            <div id="score" class="stat-value">00000</div>
        </div>
        <div class="stat-item">
            <span>HIGH SCORE</span>
            <div id="highScore" class="stat-value">00000</div>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>

        <div id="readyOverlay" class="overlay">
            <h2 style="color: #00f1fd;">READY?</h2>
            <p style="margin-bottom: 20px;">Sử dụng phím mũi tên để di chuyển.<br>Ăn khối màu tím để lớn lên.</p>
            <button class="btn" onclick="startGame()">Bắt đầu ngay</button>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <h2 style="color: #ff0055;">GAME OVER</h2>
            <p id="finalScoreText" style="margin-bottom: 20px;">Điểm của bạn: 0</p>
            <div>
                <button class="btn" onclick="startGame()">Chơi lại</button>
                <button class="btn btn-outline" onclick="window.location.href='../index.html'">Thoát</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const readyOverlay = document.getElementById('readyOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreText = document.getElementById('finalScoreText');

        const gridSize = 20;
        const tileCountX = canvas.width / gridSize;
        const tileCountY = canvas.height / gridSize;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0; dy = 0;
        let nextDx = 1; let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let isPaused = true;

        highScoreElement.innerText = highScore.toString().padStart(5, '0');

        function initGame() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            nextDx = 1; nextDy = 0;
            dx = 1; dy = 0;
            score = 0;
            updateScoreDisplay();
            createFood();
        }

        function startGame() {
            readyOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            initGame();
            isPaused = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCountX),
                y: Math.floor(Math.random() * tileCountY)
            };
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) createFood();
            });
        }

        function draw() {
            if (isPaused) return;
            dx = nextDx; dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) return gameOver();
            for (let part of snake) {
                if (part.x === head.x && part.y === head.y) return gameOver();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScoreDisplay();
                createFood();
            } else {
                snake.pop();
            }

            ctx.fillStyle = '#1a1a2a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#bc13fe';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#bc13fe';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#00f1fd' : '#00b8c4';
                ctx.shadowBlur = index === 0 ? 15 : 0;
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function updateScoreDisplay() {
            scoreElement.innerText = score.toString().padStart(5, '0');
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.innerText = highScore.toString().padStart(5, '0');
            }
        }

        function gameOver() {
            isPaused = true;
            clearInterval(gameLoop);
            finalScoreText.innerText = `Điểm của bạn: ${score}`;
            gameOverOverlay.classList.remove('hidden');
        }

        window.addEventListener('keydown', e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.key) > -1) {
                e.preventDefault();
            }
            switch (e.key) {
                case 'ArrowUp': if (dy !== 1) { nextDx = 0; nextDy = -1; } break;
                case 'ArrowDown': if (dy !== -1) { nextDx = 0; nextDy = 1; } break;
                case 'ArrowLeft': if (dx !== 1) { nextDx = -1; nextDy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { nextDx = 1; nextDy = 0; } break;
            }
        });
    </script>
</body>

</html>
